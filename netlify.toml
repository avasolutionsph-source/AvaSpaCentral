# Netlify Configuration for DEMO SPA ERP 2

[build]
  # Build command
  command = "npm run build"

  # Publish directory (Vite outputs to 'dist')
  publish = "dist"

  # Base directory - leave empty since package.json is at root
  base = ""

# Don't fall through to the SPA shell for missing static assets — return a
# real 404 so dynamic-import failures (e.g. when a user has an old
# index.html that references chunk hashes from a previous deploy) reject
# cleanly instead of being served HTML and triggering the
# "Expected a JavaScript module script but the server responded with a
# MIME type of text/html" error in the browser.
[[redirects]]
  from = "/assets/*"
  status = 404

# Redirect all other requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Build environment settings
[build.environment]
  NODE_VERSION = "18"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data: https://fonts.gstatic.com;"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
