# Netlify config — tells Netlify how to build and publish the Astro project
# that lives in the astro-site/ subdirectory.

[build]
  base    = "astro-site"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA-style fallback isn't needed (Astro is static), but redirect bare /index
# style paths and trailing slashes for cleanliness.
[[redirects]]
  from = "/home"
  to   = "/"
  status = 301

[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
