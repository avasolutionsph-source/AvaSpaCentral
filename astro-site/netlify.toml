# Netlify config for the AVA Spa Central marketing site (Astro).
# Lives in astro-site/ so each Netlify site (marketing vs. spa-app PWA)
# reads its own config from its base directory and the repo root has no
# global netlify.toml that would override the UI base-directory setting.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Node 22 is required for the Netlify Functions runtime here because
  # @supabase/supabase-js v2.89+ initializes a Realtime client at
  # createClient() time and that needs native WebSocket. Node 20 doesn't
  # expose WebSocket globally (it landed stable in Node 22), so getting
  # an admin client throws "Node.js 20 detected without native WebSocket
  # support" before we can even run the email pre-check.
  NODE_VERSION = "22"
  # Netlify's default secret scanner matches the *values* of all env vars
  # against the build output, then fails the deploy if any are found.
  # SUPABASE_URL is public-by-design (it's the REST endpoint every browser
  # request hits) and PUBLIC_SPA_APP_URL is the spa-app's hosted URL —
  # neither is a secret. Whitelist them so deploys don't fail when the
  # Netlify Functions bundle references process.env.SUPABASE_URL. The
  # real secret (SUPABASE_SERVICE_ROLE_KEY) is left in the scan set.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,PUBLIC_SPA_APP_URL,SPA_APP_URL,VITE_SUPABASE_URL"

# Serverless functions live next to the Astro pages so the deploy bundles
# everything together. Functions handle checkout signup, provisioning
# status polling, and the NextPay webhook (real + dev-mode).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["@supabase/supabase-js"]

# Friendly /api/* paths in front of the raw /.netlify/functions/* URLs.
# The marketing-site frontend uses these so we can later swap providers
# without rewriting page code.
[[redirects]]
  from = "/api/create-checkout-session"
  to   = "/.netlify/functions/create-checkout-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/check-provisioning-status"
  to   = "/.netlify/functions/check-provisioning-status"
  status = 200
  force = true

[[redirects]]
  from = "/api/nextpay-webhook"
  to   = "/.netlify/functions/nextpay-webhook"
  status = 200
  force = true

# SPA-style fallback isn't needed (Astro is static), but redirect bare /index
# style paths and trailing slashes for cleanliness.
[[redirects]]
  from = "/home"
  to   = "/"
  status = 301

[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
