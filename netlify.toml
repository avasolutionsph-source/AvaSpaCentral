# Netlify Configuration for DEMO SPA ERP 2

[build]
  # Build command
  command = "npm run build"

  # Publish directory (Vite outputs to 'dist')
  publish = "dist"

  # Base directory - leave empty since package.json is at root
  base = ""

# Don't fall through to the SPA shell for missing static assets — return a
# real 404 so dynamic-import failures (e.g. when a user has an old
# index.html that references chunk hashes from a previous deploy) reject
# cleanly instead of being served HTML and triggering the
# "Expected a JavaScript module script but the server responded with a
# MIME type of text/html" error in the browser.
[[redirects]]
  from = "/assets/*"
  status = 404

# Redirect all other requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Build environment settings
[build.environment]
  NODE_VERSION = "18"
  # VAPID public key for Web Push subscribe(). Safe to commit — the public
  # half is embedded in the client bundle anyway. The matching private key
  # lives only in the Supabase notify-push Edge Function secrets. Without
  # this, PushSubscriptionService.subscribe() bails with reason
  # 'no_vapid_key', push_subscriptions stays empty, and notify-push has no
  # endpoints to fan out to — so therapists get no chime / OS notification
  # when a service is assigned.
  VITE_VAPID_PUBLIC_KEY = "BJevK8uEEGxbeSQ65B-npMjoHf6XXHY-pyhDipHsbX6zbQzWCM8_d7XjSSyCCuUTpLtA7CgFY59tiNT6BiPjRc4"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=(self)"
    # connect-src now lists fonts.googleapis.com + fonts.gstatic.com so the
    # service worker's runtime cache can fetch + revalidate Google Fonts
    # stylesheets without tripping CSP. Without this the SW logs
    # "Refused to connect to fonts.googleapis.com" for every page that
    # imports a custom font, leaks an uncaught no-response error from
    # workbox, and never warms the fonts cache.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' data: https://fonts.gstatic.com;"

# Don't cache the SPA shell — every navigation must validate against the
# server so the user picks up new chunk hashes immediately after a deploy.
# Without this the browser can serve a stale index.html that references
# /assets/<old-hash>.js / .css filenames that already 404 on the new deploy,
# which surfaces as the ErrorBoundary "Something went wrong" page until
# the user hits hard-refresh.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# The service worker must always revalidate so a deploy that ships a new
# sw.js can replace the running one promptly. Workbox handles versioning
# internally, but the file itself must not be cached aggressively.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
